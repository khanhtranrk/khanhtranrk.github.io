<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link href="https://fonts.googleapis.com/css?family=M PLUS Rounded 1c" rel="stylesheet">
    <style>

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: "M PLUS Rounded 1c";
      }

      body {
        display: flex;
        flex-direction: column;
        background-color: #FFFFFF;
        width: 100vw;
        min-height: 100vh;
        overflow: hidden;
      }

      .content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @keyframes hello-world-move {
        0%   {margin: 140px 0 0 0;}
        100% {margin: 0 0 0 0;}
      }

      .hello-world {
        color: #000;
        text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
        font-size: 160px;
        font-style: normal;
        font-weight: 400;
        line-height: normal;

        animation-name: hello-world-move;
        animation-duration: 1s;
        animation-fill-mode: forwards;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: center;

        padding: 8px;
      }

      @keyframes circle-move {
        0%   {margin: -960px 0 0 -175px;}
        100% {margin: -169px 0 0 -175px;}
      }

      .circle {
        width: 960px;
        height: 960px;
        flex-shrink: 0;

        position: absolute;

        border-radius: 960px;
        background: linear-gradient(180deg, #D9D9D9 0%, rgba(217, 217, 217, 0.00) 100%);

        z-index: -1;

        margin: -960px 0 0 -960px;

        animation-name: circle-move;
        animation-duration: 1s;
        animation-fill-mode: forwards;
      }

    </style>
  </head>
  <body>
    <div class="circle"></div>
    <div class="content">
      <p class="hello-world">Hello, World!</p>
    </div>
    <div class="footer">
      <p>By <b>khanhtranrk</b></p>
    </div>
  </body>
</html>
